# =============================================================================
# CI/CD Pipeline for docs-service
# =============================================================================
# This workflow runs automatically on:
# - Pull Requests targeting dev, staging or main branches
# - Direct pushes to dev, staging or main branches
#
# What it does:
# 1. Runs all tests (including E2E tests with H2 in-memory database)
# 2. Verifies the Dockerfile can build successfully
# 3. Blocks PR merges if tests fail
#
# =============================================================================

name: Docs Service CI

on:
  pull_request:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'backend/docs-service/**'
      - '.github/workflows/ci.yml'
  
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - 'backend/docs-service/**'
      - '.github/workflows/ci.yml'

jobs:
  # =============================================================================
  # JOB 1: Run Tests
  # =============================================================================
  test:
    name: 🧪 Run Tests (Java 21)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend/docs-service
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: 🧪 Run tests
        run: mvn clean test
        env:
          SPRING_PROFILES_ACTIVE: test
      
      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/docs-service/target/surefire-reports/
          retention-days: 7
      
      - name: 💬 Test Report
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: backend/docs-service/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  # =============================================================================
  # JOB 2: Verify Docker Build
  # =============================================================================
  docker-build:
    name: 🐳 Verify Docker Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend/docs-service
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔨 Build Docker image
        run: |
          docker build -t docs-service:test .
      
      - name: 🚀 Test Docker image starts
        run: |
          # Start container in background
          docker run -d -p 8082:8082 --name docs-test docs-service:test
          
          # Wait a bit for Spring Boot to start
          sleep 10
          
          # Check if container is still running (didn't crash)
          docker ps | grep docs-test
          
          # Clean up
          docker stop docs-test
          docker rm docs-test

  # =============================================================================
  # JOB 3: Code Quality Checks
  # =============================================================================
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend/docs-service
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: 🔨 Compile code
        run: mvn clean compile -DskipTests
      