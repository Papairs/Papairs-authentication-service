steps:
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--destination=europe-west1-docker.pkg.dev/wayfindr-489809/wayfindr-reg/auth-service:latest'
      - '--context=dir:///workspace/backend'
      - '--cache=true'
      - '--cache-ttl=168h'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'authentication-service'
      - '--image=europe-west1-docker.pkg.dev/wayfindr-489809/wayfindr-reg/auth-service:latest'
      - '--region=europe-west1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--cpu-boost'
      - '--max-instances=1'
      - '--set-env-vars=JAVA_TOOL_OPTIONS=-Xmx200m'
      - '--set-secrets=DB_URL=auth_service_db-url:latest,DB_USERNAME=auth_service_db-username:latest,DB_PASSWORD=auth_service_db-password:latest'
      - '--quiet'

options:
  logging: CLOUD_LOGGING_ONLY