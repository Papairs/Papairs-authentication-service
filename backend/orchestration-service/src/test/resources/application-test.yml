server:
  port: 0

spring:
  application:
    name: orchestration-service-test

services:
  auth-service:
    url: http://localhost:8081
    timeout-seconds: 2
  docs-service:
    url: http://localhost:8082
    timeout-seconds: 2
  compensation:
    timeout-seconds: 2

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: false
    instances:
      authService:
        failure-rate-threshold: 100
        minimum-number-of-calls: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 10
        sliding-window-size: 100
        sliding-window-type: COUNT_BASED
        recordExceptions:
          - java.lang.Exception
        ignoreExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$BadRequest
          - org.springframework.web.reactive.function.client.WebClientResponseException$Unauthorized
          - org.springframework.web.reactive.function.client.WebClientResponseException$Forbidden
          - org.springframework.web.reactive.function.client.WebClientResponseException$NotFound
          - org.springframework.web.reactive.function.client.WebClientResponseException$Conflict
      docsService:
        failure-rate-threshold: 100
        minimum-number-of-calls: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 10
        sliding-window-size: 100
        sliding-window-type: COUNT_BASED
        ignoreExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$BadRequest
          - org.springframework.web.reactive.function.client.WebClientResponseException$Conflict
  retry:
    instances:
      authService:
        max-attempts: 1
        ignoreExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$BadRequest
          - org.springframework.web.reactive.function.client.WebClientResponseException$Unauthorized
          - org.springframework.web.reactive.function.client.WebClientResponseException$Forbidden
          - org.springframework.web.reactive.function.client.WebClientResponseException$NotFound
          - org.springframework.web.reactive.function.client.WebClientResponseException$Conflict
      docsService:
        max-attempts: 1
        ignoreExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$BadRequest
          - org.springframework.web.reactive.function.client.WebClientResponseException$Conflict

logging:
  level:
    com.papairs.orchestration: DEBUG
    org.springframework.web.reactive: WARN
    com.github.tomakehurst.wiremock: WARN
