# Testing Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway Configuration for Tests
spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration/h2
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true

# JPA Configuration for Tests  
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Disable validation for tests
spring.jpa.properties.hibernate.validator.apply_to_ddl=false

# B2 Configuration for Tests (mock values)
b2.bucket-name=test-bucket
b2.key-id=test-key-id
b2.application-key=test-application-key

# Logging for debugging
logging.level.org.flyway=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.test=DEBUG