<!DOCTYPE html>
<html>
<head>
    <title>Papairs API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; }
        button { margin: 5px; padding: 10px; }
        pre { background: #f5f5f5; padding: 10px; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Papairs API Test Page</h1>

    <div class="test-section">
        <h2>Test Document API</h2>
        <button onclick="testGetPage()">Get Page (demo)</button>
        <button onclick="testUpdatePage()">Update Page (demo)</button>
        <button onclick="testWebSocket()">Test WebSocket</button>
        <pre id="output"></pre>
    </div>

    <script>
        const log = (message, type = 'info') => {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            output.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            console.log(message);
        };

        const testGetPage = async () => {
            log('Testing GET /api/docs/pages/demo...');
            try {
                const response = await fetch('http://localhost:8082/api/docs/pages/demo', {
                    headers: {
                        'Accept': 'application/json',
                        'Authorization': 'Bearer test-token'
                    }
                });
                
                log(`Response status: ${response.status}`);
                
                if (response.ok) {
                    const data = await response.json();
                    log(`Success: ${JSON.stringify(data, null, 2)}`, 'success');
                } else {
                    const errorText = await response.text();
                    log(`Error: ${errorText}`, 'error');
                }
            } catch (error) {
                log(`Network error: ${error.message}`, 'error');
            }
        };

        const testUpdatePage = async () => {
            log('Testing PUT /api/docs/pages/demo...');
            try {
                const testContent = '<p>Test content from API test: ' + new Date().toISOString() + '</p>';
                
                const response = await fetch('http://localhost:8082/api/docs/pages/demo', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'Authorization': 'Bearer test-token'
                    },
                    body: JSON.stringify({ content: testContent })
                });
                
                log(`Response status: ${response.status}`);
                
                if (response.ok) {
                    const data = await response.json();
                    log(`Success: ${JSON.stringify(data, null, 2)}`, 'success');
                } else {
                    const errorText = await response.text();
                    log(`Error: ${errorText}`, 'error');
                }
            } catch (error) {
                log(`Network error: ${error.message}`, 'error');
            }
        };

        const testWebSocket = () => {
            log('Testing WebSocket connection...');
            try {
                const ws = new WebSocket('ws://localhost:8082/ws/doc');
                
                ws.onopen = () => {
                    log('WebSocket connected successfully', 'success');
                    // Test join message
                    ws.send(JSON.stringify({
                        action: 'join',
                        docId: 'demo',
                        userId: 'test-user'
                    }));
                };
                
                ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    log(`WebSocket message: ${JSON.stringify(message, null, 2)}`, 'success');
                };
                
                ws.onerror = (error) => {
                    log(`WebSocket error: ${error.message}`, 'error');
                };
                
                ws.onclose = (event) => {
                    log(`WebSocket closed: ${event.code} - ${event.reason}`);
                };
                
                // Close after 10 seconds
                setTimeout(() => {
                    ws.close();
                    log('WebSocket test completed');
                }, 10000);
                
            } catch (error) {
                log(`WebSocket error: ${error.message}`, 'error');
            }
        };

        // Clear output
        document.getElementById('output').innerHTML = '';
        log('API Test Page loaded. Click buttons to test functionality.');
    </script>
</body>
</html>
