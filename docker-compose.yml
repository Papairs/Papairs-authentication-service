services:

  # ============================================
  # FRONTEND SERVICE (Vue.js)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: papairs-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NODE_ENV=development
      - VITE_ORCHESTRATION_SERVICE_URL=http://localhost:8080
      - TZ=Europe/Copenhagen
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=3000
    depends_on:
      - orchestration-service
    networks:
      - papairs-network
    command: npm run serve
    restart: unless-stopped

  # ============================================
  # ORCHESTRATION SERVICE (Spring Cloud Gateway)
  # ============================================
  orchestration-service:
    build:
      context: ./backend/orchestration-service
      dockerfile: Dockerfile
    container_name: papairs-orchestration-service
    ports:
      - "8080:8080"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - SERVER_PORT=8080
      - SERVICES_AUTH_SERVICE_URL=http://auth-service:8081
      - SERVICES_DOCS_SERVICE_URL=http://docs-service:8082
      - SERVICES_AUTH_SERVICE_TIMEOUT_SECONDS=5
      - SERVICES_DOCS_SERVICE_TIMEOUT_SECONDS=5
      - SERVICES_COMPENSATION_TIMEOUT_SECONDS=3
      - TZ=Europe/Copenhagen
    depends_on:
      - auth-service
      - docs-service
    networks:
      - papairs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # AUTH SERVICE (Spring Boot)
  # ============================================
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: papairs-auth-service
    ports:
      - "8081:8081"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ./backend/auth-service/.env
    environment:
      - SERVER_PORT=8081
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - SESSION_DURATION_HOURS=48
      - TZ=Europe/Copenhagen
    networks:
      - papairs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # DOCS SERVICE (Spring Boot)
  # ============================================
  docs-service:
    build:
      context: ./backend/docs-service
      dockerfile: Dockerfile
    container_name: papairs-docs-service
    ports:
      - "8082:8082"
    env_file:
      - ./backend/docs-service/.env
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - SERVER_PORT=8082
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - TZ=Europe/Copenhagen
    networks:
      - papairs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/docs/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # AI SERVICE (Node.js + OpenAI)
  # ============================================
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: papairs-ai-service
    ports:
      - "3001:3001"
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ./backend/ai-service/.env
    environment:
      - PORT=3001
      - TZ=Europe/Copenhagen
    networks:
      - papairs-network
    restart: unless-stopped

# ============================================
# NETWORKS
# ============================================
networks:
  papairs-network:
    driver: bridge
